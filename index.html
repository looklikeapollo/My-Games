<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100 к 1 — Версия молодожёнов</title>

<style>
*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial,sans-serif;
background:radial-gradient(circle at top,#2446b5,#11215a 70%);
color:white;
}

.container{
max-width:1500px;
margin:auto;
padding:14px;
}

.top{
display:grid;
grid-template-columns:1fr 1.5fr 1fr;
gap:14px;
align-items:start;
margin-bottom:14px;
}

.team{
background:linear-gradient(180deg,#2f63ff,#17318c);
border-radius:20px;
padding:16px;
border:4px solid #ffd34d;
box-shadow:0 10px 25px rgba(0,0,0,.35);
}

.team.active{
border-color:#ffd34d;
}

.team input{
width:100%;
font-size:28px;
font-weight:900;
text-align:center;
border:none;
outline:none;
background:transparent;
}

.score{
font-size:90px;
font-weight:900;
text-align:center;
color:#ffd34d;
line-height:1;
margin:12px 0;
}

.turnBtn{
width:100%;
border:none;
background:linear-gradient(180deg,#ffb100,#ff7a00);
color:white;
font-size:24px;
</html>
