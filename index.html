<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100 к 1 — Wedding Edition</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial,sans-serif;
background:#0d1330;
color:white;
overflow:hidden;
}

.startScreen{
position:fixed;
inset:0;
background:radial-gradient(circle,#2746b5,#0d1330);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:999;
}

.startTitle{
font-size:88px;
font-weight:900;
color:#ffd43c;
text-align:center;
line-height:1;
text-shadow:0 0 25px rgba(255,212,60,.4);
}

.startSubtitle{
font-size:38px;
margin-top:12px;
opacity:.9;
}

.startBtn{
margin-top:40px;
border:none;
border-radius:20px;
padding:22px 42px;
font-size:32px;
font-weight:900;
cursor:pointer;
background:linear-gradient(180deg,#ffb347,#ff7b00);
color:white;
box-shadow:0 8px 20px rgba(0,0,0,.4);
}

.wrapper{
width:100vw;
height:100vh;
padding:8px;
display:flex;
align-items:center;
justify-content:center;
}

.board{
width:100%;
height:100%;
display:grid;
grid-template-columns:220px 1fr 220px;
gap:10px;
}

.side{
border-radius:24px;
padding:12px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:space-between;
box-shadow:
inset 0 0 15px rgba(255,255,255,.12),
0 0 20px rgba(0,0,0,.5);
transition:.25s;
}

.left{
background:linear-gradient(180deg,#35b6ff,#0067a8);
}

.right{
background:linear-gradient(180deg,#ff8646,#bf3c00);
}

.teamActive{
animation:pulse .8s infinite alternate;
}

@keyframes pulse{
from{
box-shadow:
0 0 10px rgba(255,255,255,.15),
inset 0 0 10px rgba(255,255,255,.1);
}

to{
box-shadow:
0 0 35px rgba(255,255,255,.55),
inset 0 0 20px rgba(255,255,255,.2);
}
}

.teamName{
width:100%;
background:#111;
border-radius:14px;
border:3px solid rgba(255,255,255,.2);
padding:10px;
font-size:24px;
font-weight:900;
text-align:center;
color:white;
outline:none;
}

.score{
font-size:82px;
font-weight:900;
line-height:1;
margin:6px 0;
text-shadow:0 0 15px rgba(255,255,255,.35);
}

.crosses{
display:flex;
flex-direction:column;
gap:8px;
margin:10px 0;
}

.cross{
width:72px;
height:72px;
border-radius:50%;
background:radial-gradient(circle at top,#fff67b,#ffbf00);
display:flex;
align-items:center;
justify-content:center;
font-size:50px;
font-weight:900;
color:#d51919;
opacity:.25;
border:4px solid rgba(255,255,255,.4);
transition:.2s;
}

.cross.active{
opacity:1;
transform:scale(1.06);
}

.turnBtn{
width:100%;
border:none;
border-radius:14px;
padding:14px;
font-size:22px;
font-weight:900;
cursor:pointer;
color:white;
background:linear-gradient(180deg,#ff7f3a,#d53c00);
}

.center{
background:
linear-gradient(90deg,#2fb3ff 0 50%,#f26b2d 50% 100%);
border-radius:24px;
padding:12px;
display:flex;
flex-direction:column;
overflow:hidden;
}

.topInfo{
background:#091022;
border-radius:18px;
padding:10px;
margin-bottom:10px;
border:3px solid rgba(255,255,255,.15);
text-align:center;
}

.roundNumber{
font-size:20px;
opacity:.8;
}

.roundTitle{
font-size:32px;
font-weight:900;
color:#ffd43c;
margin-top:4px;
}

.question{
font-size:24px;
font-weight:900;
margin-top:8px;
line-height:1.1;
}

.answers{
display:flex;
flex-direction:column;
gap:8px;
flex:1;
}

.answer{
background:#05070f;
border-radius:14px;
border:3px solid rgba(255,255,255,.15);
flex:1;
display:grid;
grid-template-columns:60px 1fr 70px;
align-items:center;
padding:0 14px;
cursor:pointer;
transition:.2s;
}

.answer.locked{
opacity:.55;
cursor:not-allowed;
}

.answer.open{
background:linear-gradient(180deg,#0c1329,#101d42);
border-color:#ffd43c;
}

.answerIndex{
font-size:30px;
font-weight:900;
text-align:center;
}

.answerText{
font-size:20px;
font-weight:900;
padding:0 8px;
line-height:1.05;
}

.answerPoints{
font-size:34px;
font-weight:900;
text-align:right;
color:#ffd43c;
}

.controls{
margin-top:10px;
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:8px;
}

.btn{
border:none;
border-radius:14px;
padding:14px;
font-size:20px;
font-weight:900;
cursor:pointer;
color:white;
}

.red{
background:linear-gradient(180deg,#ff5252,#ba0000);
}

.orange{
background:linear-gradient(180deg,#ffb347,#ff7b00);
}

.dark{
background:linear-gradient(180deg,#41538f,#1b274f);
}

.winnerScreen{
width:100vw;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:radial-gradient(circle,#2746b5,#0d1330);
text-align:center;
}

.winnerTitle{
font-size:80px;
font-weight:900;
color:#ffd43c;
}

.winnerName{
font-size:70px;
font-weight:900;
margin-top:20px;
}

.winnerScore{
font-size:46px;
margin-top:12px;
color:#ffd43c;
}

@media (max-width: 900px){

body{
overflow:auto;
}

.wrapper{
height:auto;
padding:6px;
}

.board{
grid-template-columns:1fr;
grid-template-rows:auto auto auto;
gap:8px;
min-height:100vh;
}

.side{
flex-direction:row;
align-items:center;
justify-content:space-between;
padding:10px;
gap:10px;
min-height:auto;
}

.left{
order:1;
}

.center{
order:2;
min-height:62vh;
}

.right{
order:3;
}

.teamName{
font-size:18px;
padding:8px;
width:140px;
flex-shrink:0;
}

.score{
font-size:46px;
margin:0;
min-width:70px;
text-align:center;
}

.crosses{
flex-direction:row;
gap:4px;
margin:0;
}

.cross{
width:42px;
height:42px;
font-size:28px;
border-width:2px;
}

.turnBtn{
width:auto;
padding:10px 14px;
font-size:15px;
line-height:1;
white-space:nowrap;
}

.topInfo{
padding:8px;
margin-bottom:8px;
}

.roundNumber{
font-size:14px;
}

.roundTitle{
font-size:24px;
}

.question{
font-size:19px;
margin-top:4px;
line-height:1.15;
}

.answers{
gap:6px;
}

.answer{
grid-template-columns:42px 1fr 44px;
padding:0 8px;
min-height:58px;
}

.answerIndex{
font-size:20px;
}

.answerText{
font-size:14px;
line-height:1.05;
padding:0 4px;
}

.answerPoints{
font-size:22px;
}

.controls{
grid-template-columns:1fr 1fr 1fr;
gap:6px;
margin-top:8px;
}

.btn{
padding:12px 4px;
font-size:14px;
}

.startTitle{
font-size:54px;
}

.startSubtitle{
font-size:24px;
}

.startBtn{
font-size:24px;
padding:18px 28px;
}

.winnerTitle{
font-size:46px;
}

.winnerName{
font-size:42px;
}

.winnerScore{
font-size:28px;
}

}

</style>
</head>

<body>

<div class="startScreen" id="startScreen">

<div class="startTitle">
100 к 1
</div>

<div class="startSubtitle">
wedding edition
</div>

<button class="startBtn" onclick="startGame()">
НАЧАТЬ ИГРУ
</button>

</div>

<div class="wrapper">
<div class="board">

<div class="side left" id="team1Card">
<input class="teamName" value="Команда 1">
<div class="score" id="score1">0</div>
<div class="crosses">
<div class="cross" id="team1cross1">✕</div>
<div class="cross" id="team1cross2">✕</div>
<div class="cross" id="team1cross3">✕</div>
</div>
<button class="turnBtn" onclick="setActiveTeam(1)">
ХОДИТ КОМАНДА
</button>
</div>

<div class="center">

<div class="topInfo">

</div>

<button class="btn dark" onclick="stopRound()">СТОП</button>
</div>

</div>

<div class="side right" id="team2Card">
<input class="teamName" value="Команда 2">
<div class="score" id="score2">0</div>
<div class="crosses">
<div class="cross" id="team2cross1">✕</div>
<div class="cross" id="team2cross2">✕</div>
<div class="cross" id="team2cross3">✕</div>
</div>
<button class="turnBtn" onclick="setActiveTeam(2)">
ХОДИТ КОМАНДА
</button>
</div>

</div>
</div>

<script>

const rounds = [
{
title:'',
question:'Что мужчины обычно делают одной рукой?',
multiplier:1,
answers:[
['Чешутся',2],
['Гладят кошку',2],
['Козырек, чтобы смотреть вдаль',2],
['Чистят зубы',1],
['Несут несколько предметов',1],
['Ковыряют в носу',1]
]
},
{
title:'',
question:'Что кладут в холодильник, а потом забывают на год?',
multiplier:1,
answers:[
['Капусту',2],
['Соус',2],
['Кисломолочку, купленную женой',2],
['Замороженные ягоды',1],
['Кабачок',1],
['Остатки от роллов: имбирь, соевый, васаби',1]
]
},
{
title:'',
question:'Что можно делать в последний момент за 5 минут до выхода из дома?',
multiplier:1,
answers:[
['Пойти в туалет пописать',2],
['Искать что-то (телефон, ключи, карточку и т.п.)',2],
['Гладить кошку',2],
['Все еще думать, что надеть, и опоздать',1],
['Надевать обувь',1],
['Поглядывать на часы и ждать выхода',1]
]
},
{
title:'',
question:'Самая зажатая мышца в организме человека?',
multiplier:1,
answers:[
['Шея (шейно-воротниковая зона)',2],
['Мозг',2],
['Копчик',2],
['На лбу',1],
['Ягодицы',1],
['Пальцы',1]
]
},
{
title:'',
question:'Утро портится, если это в доме закончилось. Что это?',
multiplier:1,
answers:[
['Кофе',2],
['Молоко',2],
['Вся вода в трубах',2],
['Туалетная бумага',1],
['Деньги',1],
['Кошачий корм',1]
]
},
{
title:'Игра наоборот',
question:'Почему вымерли динозавры?',
reverse:true,
multiplier:1,
answers:[
['Их убил астероид',2],
['Из-за климата',2],
['Ной не взял на Ковчег',2],
['Чтобы появилась нефть',1],
['Они не вымерли (курицы = динозавры)',1],
['Было скучно жить без людей',1]
]
},
{
title:'Двойная игра',
question:'Какое самое бесполезное изобретение человечества?',
multiplier:2,
answers:[
['Ядерная бомба',2],
['Крутилка на микроволновке',2],
['Автоматические сушилки для рук',2],
['Эбола',1],
['Шаблон для рисования стрелок',1],
['Дорогие лимонады',1]
]
},
{
title:'Тройная игра',
question:'Зачем шерстка пушистым гусеницам?',
multiplier:3,
answers:[
['Чтобы не мерзли',2],
['Чтобы ползти (цепляться)',2],
['Чтобы не ели птицы',2],
['Классовое деление на бедных и богатых',1],
['Для красоты',1],
['Где-то убыло, где-то прибыло',1]
]
},
{
title:'×4',
question:'Какой звук заставляет мгновенно вскочить среди ночи?',
multiplier:4,
answers:[
['Кошачий блев / кого-то тошнит',2],
['Храп',2],
['Стук в дверь или звук ключа в замке',2],
['Горн',1],
['Когда слышишь смех сквозь сон',1],
['Звук разбитого стекла',1]
]
},
{
title:'×5',
question:'Самый странный комплимент, который звучит как оскорбление?',
multiplier:5,
answers:[
['Ты слишком худая(ой)!',2],
['Здорово, что ты не заморачиваешься!',2],
['Ну ты, конечно, так получше выглядишь',2],
['Круто, что у тебя есть свободное время на это',1],
['Ничего не понятно, но очень интересно',1],
['Оказывается, у тебя есть чувство юмора',1]
]
},
{
title:'×10',
question:'Что можно делать за 5 минут до сна и сразу после пробуждения?',
multiplier:10,
answers:[
['Смотреть рилсы',2],
['Общаться с кошкой',2],
['Чистить зубы',2],
['Вязать',1],
['Сидеть в туалете',1],
['Зевать',1]
]
},
{
title:'Финальный раунд',
question:'Незаменимый ингредиент для любого блюда',
multiplier:1,
final:true,
answers:[
['Соль',2],
['Укроп',2],
['Сахар',2],
['Майонез',1],
['Сушеный чеснок / копченая паприка',1],
['Специи для карбонары',1]
]
}
];

let round = 0;
let opened = [];
let activeTeam = 0;
let mistakes = 0;
let score1 = 0;
let score2 = 0;
let stopped = false;
let roundPoints = 0;
let stealMode = false;
let firstTeam = 0;
let stealAttemptUsed = false;

function tone(freq,duration,type='sine'){
const ctx = new(window.AudioContext||window.webkitAudioContext)();
const osc = ctx.createOscillator();
const gain = ctx.createGain();
osc.type = type;
osc.frequency.value = freq;
osc.connect(gain);
gain.connect(ctx.destination);
gain.gain.setValueAtTime(0.25,ctx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime + duration/1000);
osc.start();
osc.stop(ctx.currentTime + duration/1000);
}

function revealSound(){ tone(900,180,'triangle'); }
function errorSound(){ tone(120,700,'sawtooth'); }
function switchSound(){ tone(500,180,'square'); }
function stopSound(){ tone(80,1000,'square'); }

function startGame(){
document.getElementById('startScreen').style.display='none';
switchSound();
}

function setActiveTeam(team){
activeTeam = team;
switchSound();
render();
}

function clearCrosses(){
for(let i=1;i<=3;i++){
document.getElementById('team1cross'+i).classList.remove('active');
document.getElementById('team2cross'+i).classList.remove('active');
}
}

function getPoints(value){
const r = rounds[round];
let pts = value;
if(r.reverse){
pts = value === 2 ? 1 : 2;
}
pts *= r.multiplier;
return pts;
}

function openAnswer(i){

if(opened.includes(i)) return;
if(activeTeam === 0 && !stopped) return;

opened.push(i);

const pts = getPoints(rounds[round].answers[i][1]);
roundPoints += pts;

if(!stopped){

if(stealMode){

if(!stealAttemptUsed){

stealAttemptUsed = true;

if(activeTeam === 1){
score1 += roundPoints;
}

if(activeTeam === 2){
score2 += roundPoints;
}

}else{

if(activeTeam === 1){
score1 += pts;
}

if(activeTeam === 2){
score2 += pts;
}

}

}else{

if(activeTeam === 1){
score1 += pts;
}

if(activeTeam === 2){
score2 += pts;
}

}

}

revealSound();
render();
checkVictory();
}

function mistake(){

if(activeTeam === 0) return;

mistakes++;
errorSound();

document.getElementById(
'team'+activeTeam+'cross'+mistakes
).classList.add('active');

if(!stealMode){

if(mistakes >= 3){

setTimeout(()=>{

firstTeam = activeTeam;
activeTeam = activeTeam === 1 ? 2 : 1;
stealMode = true;
mistakes = 0;

clearCrosses();
render();

},700);

}

}else{

setTimeout(()=>{
stopRound();
},700);

}

}

function stopRound(){
stopped = true;
activeTeam = 0;
mistakes = 0;
roundPoints = 0;
stealMode = false;
stealAttemptUsed = false;
clearCrosses();
stopSound();
render();
}

function nextRound(){

if(round < rounds.length - 1){

round++;
opened = [];
mistakes = 0;
activeTeam = 0;
stopped = false;
roundPoints = 0;
stealMode = false;
stealAttemptUsed = false;
firstTeam = 0;

clearCrosses();
switchSound();
render();

}else{
showWinner();
}

}

function checkVictory(){
if(opened.length === rounds[round].answers.length && round === rounds.length - 1){
setTimeout(showWinner,1000);
}
}

function showWinner(){

tone(523,180);
setTimeout(()=>tone(659,180),180);
setTimeout(()=>tone(784,180),360);
setTimeout(()=>tone(1046,420),540);

const winner =
score1 > score2
? document.querySelectorAll('.teamName')[0].value
: document.querySelectorAll('.teamName')[1].value;

document.body.innerHTML = `
<div class="winnerScreen">

<div class="winnerTitle">
🏆 ПОБЕДА 🏆
</div>

<div class="winnerName">
${winner}
</div>

<div class="winnerScore">
${Math.max(score1,score2)} очков
</div>

<button
onclick="location.reload()"
style="
margin-top:40px;
border:none;
border-radius:20px;
padding:20px 38px;
font-size:30px;
font-weight:900;
cursor:pointer;
background:linear-gradient(180deg,#ffb347,#ff7b00);
color:white;
box-shadow:0 8px 20px rgba(0,0,0,.4);
"
>
ИГРАТЬ ЕЩЁ РАЗ!
</button>

</div>
`;
}

function render(){

const data = rounds[round];

document.getElementById('roundNumber').innerText =
'Раунд ' + (round+1) + ' / ' + rounds.length;

document.getElementById('roundTitle').innerText = data.title;
document.getElementById('question').innerText = data.question;
document.getElementById('score1').innerText = score1;
document.getElementById('score2').innerText = score2;

document.getElementById('team1Card').classList.toggle('teamActive',activeTeam === 1);
document.getElementById('team2Card').classList.toggle('teamActive',activeTeam === 2);

const answers = document.getElementById('answers');
answers.innerHTML = '';

data.answers.forEach((a,i)=>{

answers.innerHTML += `
<div
class="answer
${opened.includes(i)?'open':''}
${activeTeam===0 && !stopped?' locked':''}"
onclick="openAnswer(${i})"
>

<div class="answerIndex">
${i+1}
</div>

<div class="answerText">
${opened.includes(i)?a[0]:'████████████████'}
</div>

<div class="answerPoints">
${opened.includes(i)?getPoints(a[1]):''}
</div>

</div>
`;

});

}

render();

</script>

</body>
</html>
