<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100 к 1</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:Arial,sans-serif;
background:#0d1330;
color:white;
overflow:hidden;
}

.wrapper{
width:100vw;
height:100vh;
padding:8px;
display:flex;
align-items:center;
justify-content:center;
}

.board{
width:100%;
height:100%;
display:grid;
grid-template-columns:220px 1fr 220px;
gap:10px;
}

.side{
border-radius:24px;
padding:12px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:space-between;
box-shadow:
inset 0 0 15px rgba(255,255,255,.12),
0 0 20px rgba(0,0,0,.5);
transition:.25s;
}

.left{
background:linear-gradient(180deg,#35b6ff,#0067a8);
}

.right{
background:linear-gradient(180deg,#ff8646,#bf3c00);
}

.teamActive{
animation:pulse .8s infinite alternate;
}

@keyframes pulse{
from{
box-shadow:
0 0 10px rgba(255,255,255,.15),
inset 0 0 10px rgba(255,255,255,.1);
}
to{
box-shadow:
0 0 35px rgba(255,255,255,.55),
inset 0 0 20px rgba(255,255,255,.2);
}
}

.teamName{
width:100%;
background:#111;
border-radius:14px;
border:3px solid rgba(255,255,255,.2);
padding:10px;
font-size:24px;
font-weight:900;
text-align:center;
color:white;
outline:none;
}

.score{
font-size:82px;
font-weight:900;
line-height:1;
margin:6px 0;
text-shadow:0 0 15px rgba(255,255,255,.35);
}

.crosses{
display:flex;
flex-direction:column;
gap:8px;
margin:10px 0;
}

.cross{
width:72px;
height:72px;
border-radius:50%;
background:radial-gradient(circle at top,#fff67b,#ffbf00);
display:flex;
align-items:center;
justify-content:center;
font-size:50px;
font-weight:900;
color:#d51919;
opacity:.25;
border:4px solid rgba(255,255,255,.4);
transition:.2s;
}

.cross.active{
opacity:1;
transform:scale(1.06);
}

.turnBtn{
width:100%;
border:none;
border-radius:14px;
padding:14px;
font-size:22px;
font-weight:900;
cursor:pointer;
color:white;
background:linear-gradient(180deg,#ff7f3a,#d53c00);
}

.center{
background:
linear-gradient(90deg,#2fb3ff 0 50%,#f26b2d 50% 100%);
border-radius:24px;
padding:12px;
display:flex;
flex-direction:column;
overflow:hidden;
}

.topInfo{
background:#091022;
border-radius:18px;
padding:10px;
margin-bottom:10px;
border:3px solid rgba(255,255,255,.15);
text-align:center;
}

.roundTitle{
font-size:34px;
font-weight:900;
color:#ffd43c;
}

.question{
font-size:26px;
font-weight:900;
margin-top:6px;
line-height:1.1;
}

.mode{
margin-top:8px;
display:inline-block;
padding:8px 14px;
border-radius:20px;
font-weight:900;
font-size:22px;
}

.reverse{
background:#d62828;
}

.double{
background:#ff8800;
}

.final{
background:#ffd43c;
color:#111;
}

.answers{
display:flex;
flex-direction:column;
gap:8px;
flex:1;
}

.answer{
background:#05070f;
border-radius:14px;
border:3px solid rgba(255,255,255,.15);
flex:1;
display:grid;
grid-template-columns:60px 1fr 70px;
align-items:center;
padding:0 14px;
cursor:pointer;
transition:.2s;
min-height:0;
}

.answer.locked{
opacity:.55;
cursor:not-allowed;
}

.answer.open{
background:linear-gradient(180deg,#0c1329,#101d42);
border-color:#ffd43c;
}

.answerIndex{
font-size:30px;
font-weight:900;
text-align:center;
}

.answerText{
font-size:22px;
font-weight:900;
padding:0 8px;
line-height:1.05;
}

.answerPoints{
font-size:34px;
font-weight:900;
text-align:right;
color:#ffd43c;
}

.controls{
margin-top:10px;
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:8px;
}

.btn{
border:none;
border-radius:14px;
padding:14px;
font-size:20px;
font-weight:900;
cursor:pointer;
color:white;
}

.red{
background:linear-gradient(180deg,#ff5252,#ba0000);
}

.orange{
background:linear-gradient(180deg,#ffb347,#ff7b00);
}

.dark{
background:linear-gradient(180deg,#41538f,#1b274f);
}

.winnerScreen{
width:100vw;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:radial-gradient(circle,#2746b5,#0d1330);
text-align:center;
}

.winnerTitle{
font-size:80px;
font-weight:900;
color:#ffd43c;
}

.winnerName{
font-size:70px;
font-weight:900;
margin-top:20px;
}

.winnerScore{
font-size:46px;
margin-top:12px;
color:#ffd43c;
}

@media(max-width:1200px){
body{overflow:auto}
.wrapper{height:auto}
.board{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="wrapper">

<div class="board">

<div class="side left" id="team1Card">

<input class="teamName" value="Команда 1">

<div class="score" id="score1">0</div>

<div class="crosses">
<div class="cross" id="team1cross1">✕</div>
<div class="cross" id="team1cross2">✕</div>
<div class="cross" id="team1cross3">✕</div>
</div>

<button class="turnBtn" onclick="setActiveTeam(1)">
ПЕРЕХОД ХОДА
</button>

</div>

<div class="center">

<div class="topInfo">

<div class="roundTitle" id="roundTitle"></div>

<div class="question" id="question"></div>

<div id="mode"></div>

</div>

<div class="answers" id="answers"></div>

<div class="controls">

<button class="btn red" onclick="mistake()">
ПРОВЕРИТЬ
</button>

<button class="btn orange" onclick="nextRound()">
СЛЕДУЮЩИЙ
</button>

<button class="btn dark" onclick="stopRound()">
СТОП
</button>

</div>

</div>

<div class="side right" id="team2Card">

<input class="teamName" value="Команда 2">

<div class="score" id="score2">0</div>

<div class="crosses">
<div class="cross" id="team2cross1">✕</div>
<div class="cross" id="team2cross2">✕</div>
<div class="cross" id="team2cross3">✕</div>
</div>

<button class="turnBtn" onclick="setActiveTeam(2)">
ПЕРЕХОД ХОДА
</button>

</div>

</div>

</div>

<script>

const rounds = [

{
title:'Раунд 1',
question:'Что мужчины обычно делают одной рукой?',
multiplier:1,
answers:[
['Чешутся',2],
['Гладят кошку',2],
['Козырек, чтобы смотреть вдаль',2],
['Чистят зубы',1],
['Несут несколько предметов',1],
['Ковыряют в носу',1]
]
},

{
title:'Раунд 2',
question:'Что кладут в холодильник, а потом забывают на год?',
multiplier:1,
answers:[
['Капуста',2],
['Соус',2],
['Кисломолочка, купленная женой',2],
['Замороженные ягоды',1],
['Кабачок',1],
['Остатки от роллов',1]
]
},

{
title:'Раунд 3',
question:'Что можно делать в последний момент за 5 минут до выхода?',
multiplier:1,
answers:[
['Пойти в туалет',2],
['Искать что-то',2],
['Гладить кошку',2],
['Думать что надеть',1],
['Надевать обувь',1],
['Ждать выхода',1]
]
},

{
title:'Раунд 4',
question:'Самая зажатая мышца?',
multiplier:1,
answers:[
['Шея',2],
['Мозг',2],
['Копчик',2],
['На лбу',1],
['Ягодицы',1],
['Пальцы',1]
]
},

{
title:'Раунд 5',
question:'Утро портится, если это закончилось',
multiplier:1,
answers:[
['Кофе',2],
['Молоко',2],
['Вода',2],
['Туалетная бумага',1],
['Деньги',1],
['Кошачий корм',1]
]
},

{
title:'ИГРА НАОБОРОТ',
question:'Почему вымерли динозавры?',
reverse:true,
multiplier:1,
answers:[
['Их убил астероид',2],
['Из-за климата',2],
['Ной не взял на ковчег',2],
['Чтобы была нефть',1],
['Не вымерли',1],
['Скучно без людей',1]
]
},

{
title:'×2',
question:'Самое бесполезное изобретение?',
multiplier:2,
answers:[
['Ядерная бомба',2],
['Крутилка микроволновки',2],
['Сушилки для рук',2],
['Эбола',1],
['Шаблон стрелок',1],
['Дорогие лимонады',1]
]
},

{
title:'×3',
question:'Зачем шерстка гусеницам?',
multiplier:3,
answers:[
['Чтобы не мерзли',2],
['Чтобы ползти',2],
['Чтобы не ели птицы',2],
['Классовое деление',1],
['Для красоты',1],
['Где-то убыло',1]
]
},

{
title:'×4',
question:'Какой звук поднимает ночью?',
multiplier:4,
answers:[
['Кошачий блев',2],
['Храп',2],
['Стук в дверь',2],
['Горн',1],
['Смех сквозь сон',1],
['Разбитое стекло',1]
]
},

{
title:'×5',
question:'Странный комплимент?',
multiplier:5,
answers:[
['Ты слишком худой',2],
['Не заморачиваешься',2],
['Так лучше выглядишь',2],
['Есть время на это',1],
['Очень интересно',1],
['Есть чувство юмора',1]
]
},

{
title:'×10',
question:'Что можно до сна и после пробуждения?',
multiplier:10,
answers:[
['Смотреть рилсы',2],
['Гладить кошку',2],
['Чистить зубы',2],
['Вязать',1],
['Пописать',1],
['Зевнуть',1]
]
},

{
title:'ФИНАЛ',
question:'Ингредиент ко всему',
multiplier:1,
final:true,
answers:[
['Соль',2],
['Укроп',2],
['Сахар',2],
['Майонез',1],
['Сушеный чеснок',1],
['Специи карбонары',1]
]
}

];

let round = 0;
let opened = [];
let activeTeam = 0;
let mistakes = 0;
let score1 = 0;
let score2 = 0;
let stopped = false;

function tone(freq,duration,type='sine'){
const ctx = new(window.AudioContext||window.webkitAudioContext)();
const osc = ctx.createOscillator();
const gain = ctx.createGain();
osc.type = type;
osc.frequency.value = freq;
osc.connect(gain);
gain.connect(ctx.destination);
gain.gain.setValueAtTime(0.25,ctx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime + duration/1000);
osc.start();
osc.stop(ctx.currentTime + duration/1000);
}

function revealSound(){ tone(900,180,'triangle'); }
function errorSound(){ tone(120,700,'sawtooth'); }
function switchSound(){ tone(500,180,'square'); }
function stopSound(){ tone(80,1000,'square'); }

function winSound(){
tone(523,180);
setTimeout(()=>tone(659,180),180);
setTimeout(()=>tone(784,300),360);
}

function setActiveTeam(team){
activeTeam = team;
switchSound();
render();
}

function clearCrosses(){
for(let i=1;i<=3;i++){
document.getElementById('team1cross'+i).classList.remove('active');
document.getElementById('team2cross'+i).classList.remove('active');
}
}

function getPoints(value){

const r = rounds[round];

let pts = value;

if(r.reverse){
pts = value === 2 ? 1 : 2;
}

pts *= r.multiplier;

return pts;
}

function openAnswer(i){

if(opened.includes(i)) return;

if(activeTeam === 0 && !stopped) return;

opened.push(i);

if(!stopped){

const pts = getPoints(
rounds[round].answers[i][1]
);

if(activeTeam === 1){
score1 += pts;
}

if(activeTeam === 2){
score2 += pts;
}

}

revealSound();

render();

checkVictory();

}

function mistake(){

if(activeTeam === 0) return;

mistakes++;

errorSound();

document.getElementById(
'team'+activeTeam+'cross'+mistakes
).classList.add('active');

if(mistakes >= 3){

setTimeout(()=>{

activeTeam = activeTeam === 1 ? 2 : 1;

mistakes = 0;

clearCrosses();

render();

},700);

}

}

function stopRound(){

stopped = true;

activeTeam = 0;

mistakes = 0;

clearCrosses();

stopSound();

render();

}

function nextRound(){

if(round < rounds.length - 1){

round++;

opened = [];
mistakes = 0;
activeTeam = 0;
stopped = false;

clearCrosses();

switchSound();

render();

}else{

showWinner();

}

}

function checkVictory(){

if(
opened.length === rounds[round].answers.length &&
round === rounds.length - 1
){
setTimeout(showWinner,1000);
}

}

function showWinner(){

winSound();

const name1 =
document.querySelectorAll('.teamName')[0].value;

const name2 =
document.querySelectorAll('.teamName')[1].value;

const winner =
score1 > score2 ? name1 : name2;

document.body.innerHTML = `
<div class="winnerScreen">

<div class="winnerTitle">
🏆 ПОБЕДА 🏆
</div>

<div class="winnerName">
${winner}
</div>

<div class="winnerScore">
${Math.max(score1,score2)} очков
</div>

</div>
`;

}

function render(){

const data = rounds[round];

document.getElementById(
'roundTitle'
).innerText = data.title;

document.getElementById(
'question'
).innerText = data.question;

let mode = '';

if(data.reverse){
mode = '<div class="mode reverse">ИГРА НАОБОРОТ</div>';
}
else if(data.final){
mode = '<div class="mode final">ФИНАЛ</div>';
}
else if(data.multiplier > 1){
mode = '<div class="mode double">×'+data.multiplier+'</div>';
}

document.getElementById(
'mode'
).innerHTML = mode;

document.getElementById(
'score1'
).innerText = score1;

document.getElementById(
'score2'
).innerText = score2;

document.getElementById(
'team1Card'
).classList.toggle(
'teamActive',
activeTeam === 1
);

document.getElementById(
'team2Card'
).classList.toggle(
'teamActive',
activeTeam === 2
);

const answers =
document.getElementById('answers');

answers.innerHTML = '';

data.answers.forEach((a,i)=>{

answers.innerHTML += `
<div
class="answer
${opened.includes(i)?'open':''}
${activeTeam===0 && !stopped?' locked':''}"
onclick="openAnswer(${i})"
>

<div class="answerIndex">
${i+1}
</div>

<div class="answerText">
${opened.includes(i)?a[0]:'████████████'}
</div>

<div class="answerPoints">
${opened.includes(i)?getPoints(a[1]):''}
</div>

</div>
`;

});

}

render();

</script>

</body>
</html>
