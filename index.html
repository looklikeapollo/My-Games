<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100 к 1 — Wedding Edition</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial,sans-serif;
background:#0d1330;
color:white;
overflow:hidden;
}

.startScreen{
position:fixed;
inset:0;
background:radial-gradient(circle,#2746b5,#0d1330);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:999;
}

.startTitle{
font-size:88px;
font-weight:900;
color:#ffd43c;
text-align:center;
line-height:1;
text-shadow:0 0 25px rgba(255,212,60,.4);
}

.startSubtitle{
font-size:38px;
margin-top:12px;
opacity:.9;
}

.startBtn{
margin-top:40px;
border:none;
border-radius:20px;
padding:22px 42px;
font-size:32px;
font-weight:900;
cursor:pointer;
background:linear-gradient(180deg,#ffb347,#ff7b00);
color:white;
box-shadow:0 8px 20px rgba(0,0,0,.4);
}

.wrapper{
width:100vw;
height:100vh;
padding:8px;
display:flex;
align-items:center;
justify-content:center;
}

.board{
width:100%;
height:100%;
display:grid;
grid-template-columns:220px 1fr 220px;
gap:10px;
}

</html>
